# Hydra-driven Nsight Python profiler for P2G stages or full Warp timesteps.
#
# Example:
#   pixi run -e gpu python profile_nsight.py -cn nsight_profile \
#     kernel=jax material=jelly_jacobi nsight.phase=p2g sim.n_particles=65536
defaults:
  - config
  - _self_

benchmark: true
tag: nsight_profile

nsight:
  # p2g profiles one annotated P2G stage wrapper per kernel. step is retained
  # for the pure-Warp bonus kernels and emits one annotation per timestep phase.
  phase: p2g
  include_step_total: true
  write_json: true
  plot:
    enabled: false
    metric: gpu__time_duration.sum
    filename: nsight_plot.png
    title: Nsight Kernel Metrics
    ylabel: GPU time duration (ns)
    row_panels: null
    col_panels: null
    x_keys: null
    variant_fields: null
    variant_annotations: null
    plot_type: bar
    show_aggregate: avg
    annotate_points: false
    print_data: false
  # Native Nsight Python parameter sweep. n_particles, num_grids, and
  # steps_per_frame are combined with itertools.product and become function
  # parameters/DataFrame columns. kernels are run inside each config as
  # annotation variants, matching the official framework-comparison examples.
  sweep:
    kernels:
      - ${kernel.name}
    n_particles:
      - ${sim.n_particles}
    num_grids:
      - ${sim.num_grids}
    steps_per_frame:
      - ${sim.steps_per_frame}
  # Passed directly to nsight.analyze.kernel after Hydra resolves the config.
  # Any Nsight Python analyzer option with a YAML-serializable value can be
  # overridden here. combine_kernel_metrics accepts null, sum, max, or min.
  # derive_metric accepts null, throughput, or speed_of_light.
  analyze:
    runs: 1
    output: progress
    output_csv: true
    replay_mode: kernel
    combine_kernel_metrics: sum
    cache_control: all
    clock_control: none
    derive_metric: throughput
    metrics:
      - gpu__time_duration.sum

sim:
  n_particles: 65536
  num_grids: 32
  num_frames: 1
  steps_per_frame: 1
