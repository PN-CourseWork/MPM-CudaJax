# Full comparison sweep: JAX (pure) vs JAX+CUDA scatter.
#
# Usage: pixi run -e gpu python simulate.py -cn sweep_all
#
# Build CUDA kernels first: pixi install -e gpu
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 5000,10000,50000,100000
      kernel: jax,cuda_v1,cuda_v2

benchmark: true
tag: sweep_all
sim:
  num_frames: 20
  num_grids: 64
