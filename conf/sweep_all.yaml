# Full comparison sweep: JAX variants vs inline CUDA kernels.
#
# Usage: pixi run -e gpu python simulate.py -cn sweep_all
#
# Build CUDA kernels first: pixi install -e gpu
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 5000,10000,50000,100000
      kernel: jax,jax_v1_5,warp_v1_inline,cuda_v2_inline,cuda_v3_inline,cuda_v6_inline

benchmark: true
tag: sweep_all
sim:
  num_frames: 20
  num_grids: 64
