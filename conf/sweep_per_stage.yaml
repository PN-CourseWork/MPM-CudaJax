# Per-stage vs per-frame JIT comparison.
# Usage: uv run --extra jax-cuda python simulate.py -cn sweep_per_stage
#
# 4 particle counts x 4 kernels x 2 timing modes = 32 runs.
# Each run is benchmark mode (no GIF), 30 frames * 10 substeps = 300 steps.
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      sim.n_particles: 5000,50000,200000,500000
      kernel: jax,cuda_v1,cuda_v3,cuda_v4
      timing_mode: per_frame,per_stage

benchmark: true
tag: per_stage_sweep
# Steady-state ms/step is locked in after the JIT warmup, so 5 frames is
# enough for stable timings. Bump for tighter std on individual numbers.
sim:
  num_frames: 5
  num_grids: 64
