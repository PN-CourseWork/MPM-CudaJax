# Profile sweep: all kernels with the JAX profiler.
# Usage: pixi run -e gpu python simulate.py -cn sweep_profile
#
defaults:
  - config
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      kernel: jax,jax_v1_5,warp_v1_inline,warp_v2_tile,warp_v3_supercell_tile,cuda_v2_inline,cuda_v3_inline,cuda_v6_inline
      profile: jax

benchmark: true
tag: profile
sim:
  num_frames: 3
  n_particles: 10000
  num_grids: 64
